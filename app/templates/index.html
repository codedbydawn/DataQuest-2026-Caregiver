<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DAMB | Caregiver Burnout Profiler</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">DAMB</a>
        <span class="navbar-text text-muted">DataQuest 2026 Caregiver Burnout Profiling Tool</span>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-9">
            <div class="mb-4 text-center">
              <h1 class="display-6 fw-semibold">Caregiver Burnout Profile Intake</h1>
              <p class="lead text-muted">
                Submit caregiver context to classify profile risk and prepare tailored next-step support.
              </p>
              <p class="small text-muted mb-0">
                Prototype form only. Final inputs and wording may change after data cleaning, EDA, and model validation.
              </p>
            </div>

            <div class="card border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('predict') }}" method="post" class="row g-4">
                  <!-- TODO: Replace this temporary intake with fields mapped to confirmed GSS Cycle 32 variables after EDA. -->
                  <!-- TODO: Prioritize person-level predictors from maindata and only expose episode-derived fields after aggregation rules are finalized. -->
                  <div class="col-md-6">
                    <label for="care_hours" class="form-label">Weekly Caregiving Hours</label>
                    <input type="number" class="form-control" id="care_hours" name="care_hours" placeholder="e.g. 20">
                  </div>

                  <div class="col-md-6">
                    <label for="employment_status" class="form-label">Employment Status</label>
                    <select class="form-select" id="employment_status" name="employment_status">
                      <option selected disabled>Select an option</option>
                      <option>Employed full-time</option>
                      <option>Employed part-time</option>
                      <option>Not currently employed</option>
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label for="support_network" class="form-label">Support Network</label>
                    <select class="form-select" id="support_network" name="support_network">
                      <option selected disabled>Select an option</option>
                      <option>Strong support</option>
                      <option>Some support</option>
                      <option>Little or no support</option>
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label for="care_duration" class="form-label">Caregiving Duration</label>
                    <input type="text" class="form-control" id="care_duration" name="care_duration" placeholder="e.g. 2 years">
                  </div>

                  <div class="col-12">
                    <label for="notes" class="form-label">Additional Notes</label>
                    <textarea class="form-control" id="notes" name="notes" rows="4" placeholder="Optional context for future form design"></textarea>
                  </div>

                  <div class="col-12">
                    <!-- TODO: Replace placeholder fields with real model-aligned inputs after EDA confirms the final variables. -->
                    <!-- TODO: Group inputs by profile drivers such as caregiving load, support access, employment strain, financial strain, and emotional impact. -->
                    <!-- TODO: Preserve Statistics Canada coded categories carefully, including reserved skip/not-stated handling where relevant. -->
                    <!-- TODO: Add validation states and helper text once the final questionnaire is defined. -->
                    <button type="submit" class="btn btn-primary btn-lg w-100">Generate Caregiver Profile</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
